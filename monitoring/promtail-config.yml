server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: zbor-backend
    static_configs:
      - targets:
          - localhost
        labels:
          app: zbor-backend
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            container_name: attrs.name
      - labels:
          container_name: