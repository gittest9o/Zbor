services:

  postgres:
    image: postgres:16-alpine
    container_name: zbor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zbor
      POSTGRES_USER: zbor_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zbor_pass}
    ports:
      - "5432:5432"
    volumes:
      - zbor-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zbor_user -d zbor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zbor-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zbor
      SPRING_DATASOURCE_USERNAME: zbor_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-zbor_pass}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    ports:
      - "8080:8080"

volumes:
  zbor-pg-data:
