spring:
  application:
    name: zbor
  datasource:
    url: jdbc:postgresql://localhost:5432/zbor
    username: zbor_user
    password: zbor_pass
    driver-class-name: org.postgresql.Driver


  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
